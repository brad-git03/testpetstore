services:
  - type: web
    name: petstore-backend
    runtime: docker
    rootDir: backend
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: petstore-db
          property: connectionString

  - type: web
    name: petstore-frontend
    runtime: static
    rootDir: frontend
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://petstore-backend.onrender.com

databases:
  - name: petstore-db
    plan: free
    region: singapore
