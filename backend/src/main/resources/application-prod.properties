server.port=${PORT:8080}

# Datasource: if SPRING_DATASOURCE_* env vars are set they will be used.
# If only DATABASE_URL is provided (e.g. Render), DataSourceConfig will parse it.
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT secret must be provided as environment variable in production
jwt.secret=${JWT_SECRET:}

logging.level.root=INFO
management.endpoints.web.exposure.include=health,info
